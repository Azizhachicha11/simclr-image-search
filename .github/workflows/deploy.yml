# ═══════════════════════════════════════════════════════════════════════════════
# CD Pipeline — Déploiement automatique
# ═══════════════════════════════════════════════════════════════════════════════

name: "CD — Deploy"

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Job 1 : Tests ──────────────────────────────────────────────────────────
  test:
    name: "🧪 Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Download model & index from Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import hf_hub_download
          import os
          os.makedirs('checkpoints', exist_ok=True)
          os.makedirs('index', exist_ok=True)
          hf_hub_download(repo_id='ElBOOH55/simclr-stl10', filename='simclr_best.pt', local_dir='checkpoints', token=os.environ.get('HF_TOKEN'))
          hf_hub_download(repo_id='ElBOOH55/simclr-stl10', filename='faiss.index', local_dir='index', token=os.environ.get('HF_TOKEN'))
          hf_hub_download(repo_id='ElBOOH55/simclr-stl10', filename='labels.npy', local_dir='index', token=os.environ.get('HF_TOKEN'))
          print('All files downloaded')
          "

      - name: Run tests
        run: PYTHONPATH=. python -m pytest tests/ -v --tb=short

  # ── Job 2 : Deploy Backend → Render ────────────────────────────────────────
  deploy-backend:
    name: "🚀 Deploy Backend → Render"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Deploy triggered"

  # ── Job 3 : Deploy Frontend → GitHub Pages ─────────────────────────────────
  deploy-frontend:
    name: "🌐 Deploy Frontend → GitHub Pages"
    runs-on: ubuntu-latest
    needs: test

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Replace API URL for production
        run: |
          sed -i 's|http://localhost:8000|${{ secrets.API_URL }}|g' frontend/app.js
          echo "API URL replaced"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "frontend/"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
